name: buskirala
description: "Buskirala mobil uygulaması"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  google_maps_flutter: ^2.15.0
  shared_preferences: ^2.5.4
  flutter_launcher_icons: ^0.14.4
  webview_flutter: ^4.13.1
  webview_flutter_android: ^4.3.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/favicon.png
    - assets/images/buskirala-logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/favicon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/favicon.png"